<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine To-Do-Liste</title>
    <link rel="stylesheet" href="styleHome.css">
</head>

<body>
    <article class="contant">
        <div class="topHead">
            <img class="logo" src="img/LogoMakr-61gwxy.png" alt="">
            <img class="wave" src="img/wave.svg" alt="">

        </div>

        <div class="text_left_right">

            <div class="text_lücke">
                <h1>Willkommen bei deiner <br> To-Do-Liste</h1>
                <p>Dein einfacher Planer für den Alltag.</p>

                <ul id="myTodos"></ul>

                <form action="" onsubmit="addTodo(); return false;">
                    <input class="word" type="text" required id="todoField" placeholder="Neue Aufgabe eingeben...">
                    <button class="ok" type="submit">Aufgaben hinzufügen</button>
                    <button type="button" class="löschen" onclick="deleteTodo()">löschen</button>
                    <button type="button" class="export" onclick="exportTodos()">export</button>
                </form>
            </div>

            <img class="foto" src="img/coding.png" alt="">
        </div>


        <img class="wave-down" src="img/wave (1).svg" alt="">

    </article>


    <div id="cookie-banner"
        style="position: fixed; bottom: 0; left: 0; width: 100%; background: #333; color: white; padding: 15px; text-align: center;">
        Diese Website verwendet Cookies, um deine Aufgaben zu speichern. <button onclick="acceptCookies()"
            style="margin-left: 20px; padding: 10px 15px;">Akzeptieren</button>
    </div>
    <div class="erklärungen">
        <a href="impressum.html">Impressum</a>
        <a href="datenschutzerklärung.html">Datenschutz</a>
    </div>

    <footer>&copy; 2026 Amin Attai</footer>

    <script src="script.js"></script>
</body>

</html>
